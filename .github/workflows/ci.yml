name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      # The layer rules run from packages/boundary-lint (published as
      # @substrat-run/boundary-lint), so they need the build above — the repo
      # lints itself with the same code a from-scratch vertical runs.
      - run: node tools/boundary-lint.mjs
      - run: pnpm -r typecheck
      # The rule this job exists to enforce: the pure-SQLite adapter stays
      # green in CI forever (master plan D-14). Contract tests + the FSM
      # demo's nine-step scenario.
      - run: pnpm -r test
