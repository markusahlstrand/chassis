name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm -r typecheck
      # The rule this job exists to enforce: the pure-SQLite adapter stays
      # green in CI forever (master plan D-14). Contract tests + the FSM
      # demo's nine-step scenario.
      - run: pnpm -r test
