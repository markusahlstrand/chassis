name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      # npm trusted publishing (OIDC, tokenless) needs npm >= 11.5.1; Node 22
      # bundles 10.x. Provenance is automatic under trusted publishing.
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      # With pending changesets: opens/updates the "Version Packages" PR.
      # Without: publishes any package whose version is not yet on npm, via
      # the trusted-publisher config on each @substrat-run package (no token).
      - uses: changesets/action@v1
        with:
          publish: pnpm release
          commit: "Version packages"
          title: "Version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
