name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          # Node 24 bundles npm 11.x — trusted publishing needs >= 11.5.1, and a
          # bundled npm avoids the version skew a global upgrade introduces.
          node-version: 24
          # OIDC needs the registry configured here, not just at publish time.
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # With pending changesets: opens/updates the "Version Packages" PR.
      # Without: `pnpm release` publishes any package whose version is not yet on
      # npm, tokenless via each package's trusted-publisher config (provenance is
      # automatic). We publish with `pnpm publish -r` rather than
      # `changeset publish`: with OIDC available, changesets publishes through npm
      # but still passes pnpm's --git-checks flag, which npm 11 rejects outright
      # (EUNKNOWNCONFIG). pnpm skips already-published versions on its own.
      - uses: changesets/action@v1
        with:
          publish: pnpm release
          commit: "Version packages"
          title: "Version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
